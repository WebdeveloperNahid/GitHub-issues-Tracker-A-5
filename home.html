<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub issues Tracker</title>
    <!-- tailwindcss + daisy Ui-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- css -->
    <link rel="stylesheet" href="tailwind.init.css" />
    <!-- font  cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <nav class="flex justify-between items-center w-full h-15 bg-white shadow-2xl">
      <div class="flex justify-center items-center pl-20">
        <img class="w-8 h-8 " src="assets/github-logo.png" alt="" />
        <h1 class="text-[24px] font-bold pl-2">GitHub Issues Tracker</h1>
      </div>

      <div class="flex gap-1 ">
        <label class="input">
          <svg
            class="h-[1em]  opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input class="w-[300px]" type="search" required placeholder="Search issues..." />
        </label>

        <button class="btn btn-primary px-10 py-3 text-[16px] pr-20">+ New Issue</button>
      </div>
      

    </nav>
  </body>
</html>
