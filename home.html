<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub issues Tracker</title>
    <!-- tailwindcss + daisy Ui-->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font  cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- css -->
    <link rel="stylesheet" href="tailwind.init.css" />
  </head>
  <body>
    <nav
      class="h-35 space-y-6 lg:flex justify-between items-center w-full h-18 bg-white shadow-2xl"
    >
      <div class="sm:ml-2 pt-5 gap-2 flex justify-center items-center md:ml-10">
        <img class=" w-8 h-8" src="assets/github-logo.png" alt="" />
        <h1 class=" text-[24px] font-bold ">
          GitHub Issues Tracker
        </h1>
      </div>

      <div class="flex justify-center gap-1 ">
        <label class="input ">
          <svg
            class="h-[1em] opacity-50  "
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input
            id="search-input"
            class=" w-[100px] md:w-[250px] lg:w-[300px] "
            type="search"
            required
            placeholder="Search issues..."
          />
        </label>

        <button
          id="search-btn"
          class="btn btn-primary py-3 text-[14px] "
        >
          + New Issue
        </button>
      </div>
    </nav>

    <section
      class=" md:w-[95%] lg:w-[85%] mx-auto h-[88px] shadow-2xl flex items-center pl-6 mt-[50px]"
    >
      <div class="gap-2">
        <button
          onclick="toggleFun(id)"
          id="all-btn"
          class="btn btn-primary px-7"
        >
          All
        </button>
        <button
          onclick="toggleFun(id)"
          id="open-btn"
          class="btn btn-outline btn-primary px-7"
        >
          Open
        </button>
        <button
          onclick="toggleFun(id)"
          id="closed-btn"
          class="btn btn-outline btn-primary px-7"
        >
          Closed
        </button>
      </div>
    </section>

    <section
      class="md:w-[95%] lg:w-[85%] mx-auto h-[88px] shadow-2xl pl-6 mt-[30px] mb-3 flex justify-between items-center gap-4"
    >
      <div class="gap-2 flex justify-between items-center">
        <img src="assets/Aperture.png" alt="" />
        <div>
          <h3><span id="count">0</span> Issues</h3>
          <p>Track and manage your project issues</p>
        </div>
      </div>

      <div class="flex gap-2 mr-6">
        <p>
          <span class="text-green-500 px-1"
            ><i class="fa-solid fa-circle"></i></span
          >Open
        </p>
        <p>
          <span class="text-[#A855F7] px-1"
            ><i class="fa-solid fa-circle"></i></span
          >Closed
        </p>
      </div>
    </section>

    <section class=" md:w-[95%] lg:w-[85%] mx-auto">
      <!-- there  will be daynamekaly Update Data From API -->

      <div
        id="data-container"
        class="p-6 gap-4 shadow-2xl grid grid-cols-1 h-full md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 h-full"
      >
        <!-- <div class="p-6 w-[300px] h-[253]  space-y-2 rounded-2xl border-t-4 border-green-500 shadow-2xl mx-auto">

          <div class="flex justify-between items-center">
            <img src="assets/Open-Status.png" alt="">
            <button class="btn btn-active btn-error px-8 rounded-2xl py-1">HIGH</button>
          </div>

          <h1>Fix navigation menu on mobile devices</h1>
          <p>The navigation menu doesn't collapse properly on mobile devices...</p>

          <div class="flex justify-start items-center gap-2 pb-3">
            <button class="btn btn-active btn-error px-4 rounded-2xl py-1 text-[#EF4444] bg-[#FECACA]  "><span><i class="fa-solid fa-bug"></i></span>BUG</button>
            <button class="btn btn-active btn-error w-40 rounded-2xl py-1 text-[#D97706] bg-[#FDE68A]"><span><i class="fa-solid fa-life-ring"></i></span>HELP WANTED</button>
          </div>

          <hr class="text-[#4e4e4e62] border-1">

          <p># by john_doe</p>
          <span>1/15/2024</span>
        </div>
        -->
      </div>
    </section>

    <section class="w-[100%] flex justify-center mt-20">
      <span
        id="loadingSpinner"
        class="hidden w-[20%] loading loading-spinner loading-xl"
      ></span>
    </section>

    <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <div id="dettails-container" class="space-y-4">

          <!-- ---------------------- -->
          <h1 class ="text-[19px] font-semibold " >${da.title}</h1>
          <div class="flex gap-2">
            <button class="rounded-2xl bg-green">Open</button>
            <span>.</span>
            <p>Opend by Fahim Ahmed</p>
            <span>${da.createdAt.split("T")[0]}</span>
          </div>

          <div class="flex justify-start items-center gap-2 pb-3">
           ${labelButtons}
          </div>

           <p class = "line-clamp-2 " >${da.description} </p>

           <div class="flex  gap-[50%] bg-green " >
            <span>
              <p>Assignee:</p>
              <h2>Fahim Ahmed</h2>
            </span>

            <span class="">
              <p>priority:</p>
              <button class="btn-high text-[#9CA3AF] bg-[#EEEFF2] px-8 rounded-2xl py-1 uppercase ${priorityClass} ">${da.priority} </button>
            </span>
           </div>
          <!-- --------------------------------------- -->
         
        </div>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn bg-[#4A00FF] text-white">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="homeApi.js"></script>
  </body>
</html>
